<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ELEKTRON Wellness Studio</title>
  <meta name="description" content="ELEKTRON Wellness Studio is a ritual-based creative wellness studio rooted in amber." />
  <link rel="stylesheet" href="style.css" />

  <style>
    .reflections-grid{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:20px;
      margin-top:28px;
    }

    .reflection-card{
      background:#fff;
      color:#000;
      border-radius:14px;
      padding:24px;
      box-shadow:0 10px 24px rgba(0,0,0,0.12);
      display:flex;
      flex-direction:column;
    }

    .reflection-mark{
      font-size:2rem;
      color:#a56d1b;
      margin-bottom:10px;
    }

    .reflection-name{
      margin-top:auto;
      color:#8f5a10;
      font-weight:600;
    }

    @media (max-width:900px){
      .reflections-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>ELEKTRON Wellness Studio</h1>
</header>

<main>

<section id="reflections">
  <h2>Reflections</h2>

  <div id="reflections-grid" class="reflections-grid">
    <div class="reflection-card">
      <div class="reflection-mark">“</div>
      <p>Reflections will appear here as they are approved.</p>
      <div class="reflection-name">ELEKTRON</div>
    </div>
  </div>

  <div style="margin-top:20px;">
    <a href="https://forms.gle/7DXAvpyFibqrxQWL8" target="_blank">
      Share Your Reflection
    </a>
  </div>
</section>

</main>

<script>
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQhd1g9sqwF_GF_AwxmphNGf_BnHjdjlTFPEe0l6Q7VM_4IUh4bLR32fN_faAPGAEkgQxVmZ8NdckCA/pub?output=csv")
.then(response => response.text())
.then(data => {

  const rows = data.split("\n").slice(1);

  const reviews = rows
    .map(row => row.split(","))
    .filter(r => 
      r[5] && r[5].trim().toLowerCase() === "yes" &&
      r[4] && r[4].toLowerCase().includes("yes")
    )
    .reverse()
    .slice(0, 6);

  const grid = document.getElementById("reflections-grid");

  if(reviews.length === 0) return;

  grid.innerHTML = reviews.map(r => `
    <div class="reflection-card">
      <div class="reflection-mark">“</div>
      <p>${r[3]}</p>
      <div class="reflection-name">— ${r[0]}</div>
    </div>
  `).join("");

});
</script>

</body>
</html>
