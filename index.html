<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ELEKTRON Wellness Studio</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: #eadfca;
      font-family: Georgia, serif;
    }

    .wrap {
      width: min(1100px, 92%);
      margin: auto;
    }

    header {
      padding: 20px 0;
      border-bottom: 1px solid rgba(198,161,91,0.2);
    }

    header img {
      width: 60px;
    }

    h1 {
      color: #c6a15b;
      text-align: center;
      margin-top: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .card {
      background: #121212;
      padding: 20px;
      border-radius: 15px;
      border: 1px solid rgba(198,161,91,0.2);
    }

    .card h3 {
      color: #c6a15b;
    }

    .card a {
      display: inline-block;
      margin-top: 10px;
      color: #c6a15b;
      text-decoration: none;
      border: 1px solid #c6a15b;
      padding: 8px 12px;
      border-radius: 8px;
    }

    .card a:hover {
      background: #c6a15b;
      color: black;
    }
  </style>
</head>

<body>

<header class="wrap">
  <img src="elektron-logo.png" />
</header>

<div class="wrap">
  <h1>ELEKTRON Products</h1>

  <div class="grid">

      <a href="ritual-renewal-butter.html">View</a>
    </div>

    <div class="card">

      <a href="ritual-lip-scrub.html">View</a>
    </div>

    <div class="card">
      <h3>Ritual Scrub</h3>
      <a href="ritual-restore-scrub.html">View</a>
    </div>

    <div class="card">
      <h3>Ritual Spray</h3>
      <a href="ritual-spray.html">View</a>
    </div>

    <div class="card">
      <h3>Amber Ritual Oil</h3>
      <a href="Amber-Ritual-Oil.html">View</a>
    </div>

    <div class="card">
      <h3>Amber Anchor</h3>
      <a href="amber-anchor.html">View</a>
    </div>

    <div class="card">
      <h3>30 Day Ritual</h3>
      <a href="30-day-ritual.html">View</a>
    </div>

    <div class="card">
      <h3>7 Day Grounding</h3>
      <a href="7-day-grounding.html">View</a>
    </div>

  </div>
</div>

</html>
